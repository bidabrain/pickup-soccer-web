<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 760 1302">
<rect width="760" height="1302" fill="#ffffff"/>
<rect x="16" y="16" width="728" height="104" rx="14" fill="#0F6E56"/>
<text x="40" y="58" font-size="22" font-weight="600" fill="#ffffff">Pickup Football Guide</text>
<text x="40" y="84" font-size="13" fill="#bfe6d8">No sign-up · manage with a PIN</text>
<text x="40" y="104" font-size="12" fill="#9FE1CB">bidabrain.github.io/pickup-soccer-web</text>
<rect x="16" y="136" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="160" r="13" fill="#1D9E75"/><text x="40" y="165" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
<text x="64" y="166" font-size="16" font-weight="600" fill="#0b3d33">Home · browse matches</text>
<text x="40" y="190" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="190" font-size="13" fill="#374151">Open the site to see all matches — no login needed</text>
<text x="40" y="214" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="214" font-size="13" fill="#374151">Badge shows status: more needed / full+waiting / ended (gray)</text>
<text x="40" y="238" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="238" font-size="13" fill="#374151">Tap a card for details; tap Share to copy its link</text>
<text x="40" y="262" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="262" font-size="13" fill="#374151">Tap + at the bottom-right to create a match</text>
<text x="40" y="286" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="286" font-size="13" fill="#374151">Switch language at the top-right: 中文 / English / 한국어</text>
<rect x="560" y="154" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 166 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="170" font-size="9" fill="#ffffff">Pickup Football</text><rect x="572" y="186" width="144" height="40" rx="6" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="200" font-size="9" fill="#374151">Fri 19:00</text><text x="580" y="216" font-size="8" fill="#9ca3af">Riverside · ₩10k</text><rect x="668" y="190" width="48" height="15" rx="7" fill="#FAEEDA"/><text x="692" y="201" font-size="8" fill="#854F0B" text-anchor="middle">Need 7</text><rect x="572" y="234" width="144" height="40" rx="6" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="248" font-size="9" fill="#374151">Sat 20:30</text><text x="580" y="264" font-size="8" fill="#9ca3af">Univ. Field</text><rect x="680" y="238" width="36" height="15" rx="7" fill="#E1F5EE"/><text x="698" y="249" font-size="8" fill="#0F6E56" text-anchor="middle">Full</text><circle cx="704" cy="282" r="13" fill="#1D9E75"/><text x="704" y="287" font-size="17" fill="#ffffff" text-anchor="middle">+</text>
<rect x="16" y="332" width="728" height="198" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="356" r="13" fill="#1D9E75"/><text x="40" y="361" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
<text x="64" y="362" font-size="16" font-weight="600" fill="#0b3d33">Create a match</text>
<text x="40" y="386" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="386" font-size="13" fill="#374151">Pick timezone (default KST) and date (within 7 days from today)</text>
<text x="40" y="410" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="410" font-size="13" fill="#374151">Fill time, venue, fee per person (₩), players; note optional</text>
<text x="40" y="434" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="434" font-size="13" fill="#374151">Set a 6-digit manager PIN — needed to edit/delete this match later</text>
<text x="40" y="458" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="458" font-size="13" fill="#374151">Tap Create match; it appears on the home list</text>
<rect x="560" y="350" width="168" height="172" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 362 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="366" font-size="9" fill="#ffffff">← Create</text><rect x="572" y="382" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="394" font-size="8.5" fill="#9ca3af">Timezone</text><rect x="572" y="404" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="416" font-size="8.5" fill="#9ca3af">Date</text><rect x="572" y="426" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="438" font-size="8.5" fill="#9ca3af">Time / Venue</text><rect x="572" y="448" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="460" font-size="8.5" fill="#9ca3af">Fee / Players</text><text x="572" y="474" font-size="8" fill="#854F0B">Manager PIN</text><rect x="572" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="594" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="616" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="638" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="660" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="682" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="572" y="510" width="144" height="22" rx="6" fill="#1D9E75"/><text x="644" y="525" font-size="9.5" fill="#ffffff" text-anchor="middle">Create</text>
<rect x="16" y="544" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="568" r="13" fill="#1D9E75"/><text x="40" y="573" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
<text x="64" y="574" font-size="16" font-weight="600" fill="#0b3d33">Sign up</text>
<text x="40" y="598" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="598" font-size="13" fill="#374151">Open a match, tap Sign up</text>
<text x="40" y="622" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="622" font-size="13" fill="#374151">Enter your name + set a 6-digit personal PIN</text>
<text x="40" y="646" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="646" font-size="13" fill="#374151">Your PIN must be unique within this match (duplicates are rejected)</text>
<text x="40" y="670" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="670" font-size="13" fill="#374151">Once full, later sign-ups go to the waiting list automatically</text>
<text x="40" y="694" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="694" font-size="13" fill="#374151">You can sign up several friends (each a unique name + PIN)</text>
<rect x="560" y="562" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 574 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="578" font-size="9" fill="#ffffff">← Match</text><rect x="572" y="596" width="144" height="96" rx="8" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="610" font-size="9.5" fill="#374151">Sign up</text><rect x="580" y="618" width="128" height="16" rx="4" fill="#f3f4f6"/><text x="584" y="629" font-size="8" fill="#9ca3af">Your name</text><rect x="578" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="600" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="622" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="644" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="666" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="688" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="580" y="670" width="128" height="18" rx="5" fill="#1D9E75"/><text x="644" y="682" font-size="8.5" fill="#ffffff" text-anchor="middle">Confirm</text>
<rect x="16" y="740" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="764" r="13" fill="#1D9E75"/><text x="40" y="769" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
<text x="64" y="770" font-size="16" font-weight="600" fill="#0b3d33">Manage my sign-up</text>
<text x="40" y="794" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="794" font-size="13" fill="#374151">Tap your own name in the list</text>
<text x="40" y="818" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="818" font-size="13" fill="#374151">Enter the PIN you set when signing up</text>
<text x="40" y="842" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="842" font-size="13" fill="#374151">Edit your name, or remove your sign-up</text>
<text x="40" y="866" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="866" font-size="13" fill="#374151">Toggle "Activity fee paid" and save — a green "Paid" tag shows in the list</text>
<text x="40" y="890" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="890" font-size="13" fill="#b91c1c">Wrong PIN 10 times locks for ~10 minutes (anti guessing)</text>
<rect x="560" y="758" width="168" height="152" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 770 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="774" font-size="9" fill="#ffffff">← Players</text><rect x="572" y="788" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><text x="578" y="801" font-size="8.5" fill="#6b7280">1. Alex</text><rect x="572" y="810" width="144" height="18" rx="4" fill="#E1F5EE"/><text x="578" y="823" font-size="8.5" fill="#0F6E56">2. Sam</text><rect x="686" y="813" width="30" height="12" rx="6" fill="#CFEDE2"/><text x="701" y="822" font-size="7.5" fill="#0F6E56" text-anchor="middle">Paid</text><rect x="572" y="832" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><text x="578" y="845" font-size="8.5" fill="#6b7280">3. Lee</text><rect x="572" y="858" width="144" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/><text x="580" y="876" font-size="8.5" fill="#374151">Activity fee paid</text><rect x="682" y="863" width="30" height="18" rx="9" fill="#1D9E75"/><circle cx="705" cy="872" r="7" fill="#ffffff"/>
<rect x="16" y="936" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="960" r="13" fill="#1D9E75"/><text x="40" y="965" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
<text x="64" y="966" font-size="16" font-weight="600" fill="#0b3d33">Organizer tools (manager PIN)</text>
<text x="40" y="990" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="990" font-size="13" fill="#374151">Edit match: change time/venue/fee/size; the date is locked</text>
<text x="40" y="1014" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="1014" font-size="13" fill="#374151">Delete match: only before start; removes all sign-ups, with confirm</text>
<text x="40" y="1038" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="1038" font-size="13" fill="#374151">Draw 2 random captains (marked blue/red, can redraw)</text>
<text x="40" y="1062" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="1062" font-size="13" fill="#b91c1c">All need the manager PIN; the roster itself cannot be edited</text>
<rect x="560" y="954" width="168" height="132" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 966 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="970" font-size="9" fill="#ffffff">← Match</text><rect x="572" y="988" width="50" height="16" rx="8" fill="#E6F1FB"/><text x="597" y="999" font-size="8" fill="#185FA5" text-anchor="middle">Alex</text><rect x="630" y="988" width="50" height="16" rx="8" fill="#FCEBEB"/><text x="655" y="999" font-size="8" fill="#A32D2D" text-anchor="middle">Sam</text><rect x="572" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="595" y="1034" font-size="8" fill="#374151" text-anchor="middle">Draw</text><rect x="622" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="645" y="1034" font-size="8" fill="#374151" text-anchor="middle">Edit</text><rect x="672" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="695" y="1034" font-size="8" fill="#374151" text-anchor="middle">Delete</text>
<rect x="16" y="1108" width="728" height="176" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="1132" r="13" fill="#1D9E75"/><text x="40" y="1137" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">6</text>
<text x="64" y="1138" font-size="16" font-weight="600" fill="#0b3d33">Quick rules</text>
<text x="40" y="1162" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1162" font-size="13" fill="#374151">PIN: manager PIN runs the match; personal PIN is yours; unique per match</text>
<text x="40" y="1186" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1186" font-size="13" fill="#374151">Expiry: gray &amp; read-only after start; auto-deleted after 30 days, link dies </text>
<text x="64" y="1204" font-size="13" fill="#374151">too</text>
<text x="40" y="1228" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1228" font-size="13" fill="#374151">Share: each match has a fixed link to send to friends</text>
<text x="40" y="1252" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1252" font-size="13" fill="#374151">Waiting: join the list when full; auto-promoted when someone leaves</text>
<rect x="560" y="1126" width="168" height="124" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 1138 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1173" r="5" fill="#1D9E75"/><text x="594" y="1177" font-size="9" fill="#374151">PIN</text><rect x="648" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1173" r="5" fill="#185FA5"/><text x="670" y="1177" font-size="9" fill="#374151">Expiry</text><rect x="572" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1215" r="5" fill="#BA7517"/><text x="594" y="1219" font-size="9" fill="#374151">Share</text><rect x="648" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1215" r="5" fill="#A32D2D"/><text x="670" y="1219" font-size="9" fill="#374151">Waiting</text>
</svg>
