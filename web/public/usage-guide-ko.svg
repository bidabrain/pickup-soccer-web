<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 760 1284">
<rect width="760" height="1284" fill="#ffffff"/>
<rect x="16" y="16" width="728" height="104" rx="14" fill="#0F6E56"/>
<text x="40" y="58" font-size="22" font-weight="600" fill="#ffffff">Pickup Football 사용 설명</text>
<text x="40" y="84" font-size="13" fill="#bfe6d8">회원가입 없이 · PIN으로 예약과 신청 관리</text>
<text x="40" y="104" font-size="12" fill="#9FE1CB">bidabrain.github.io/pickup-soccer-web</text>
<rect x="16" y="136" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="160" r="13" fill="#1D9E75"/><text x="40" y="165" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
<text x="64" y="166" font-size="16" font-weight="600" fill="#0b3d33">홈 · 경기 둘러보기</text>
<text x="40" y="190" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="190" font-size="13" fill="#374151">사이트를 열면 모든 예약 경기가 보입니다 (로그인 불필요)</text>
<text x="40" y="214" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="214" font-size="13" fill="#374151">배지로 상태 표시: 모집중 / 마감+대기 / 종료(회색)</text>
<text x="40" y="238" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="238" font-size="13" fill="#374151">카드를 눌러 상세 보기, 공유를 눌러 링크 복사</text>
<text x="40" y="262" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="262" font-size="13" fill="#374151">오른쪽 아래 + 로 새 예약 만들기</text>
<text x="40" y="286" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="286" font-size="13" fill="#374151">오른쪽 위에서 언어 전환: 中文 / English / 한국어</text>
<rect x="560" y="154" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 166 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="188" width="144" height="38" rx="6" fill="#ffffff" stroke="#eeeeee"/><rect x="580" y="196" width="78" height="6" rx="3" fill="#e5e7eb"/><rect x="674" y="192" width="42" height="14" rx="7" fill="#FAEEDA"/><rect x="580" y="209" width="54" height="5" rx="2" fill="#eeeeee"/><rect x="572" y="234" width="144" height="38" rx="6" fill="#ffffff" stroke="#eeeeee"/><rect x="580" y="242" width="78" height="6" rx="3" fill="#e5e7eb"/><rect x="674" y="238" width="42" height="14" rx="7" fill="#E1F5EE"/><rect x="580" y="255" width="54" height="5" rx="2" fill="#eeeeee"/><circle cx="704" cy="282" r="13" fill="#1D9E75"/><text x="704" y="287" font-size="17" fill="#fff" text-anchor="middle">+</text>
<rect x="16" y="332" width="728" height="198" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="356" r="13" fill="#1D9E75"/><text x="40" y="361" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
<text x="64" y="362" font-size="16" font-weight="600" fill="#0b3d33">새 예약 만들기</text>
<text x="40" y="386" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="386" font-size="13" fill="#374151">시간대(기본 KST)와 날짜(오늘부터 7일 이내) 선택</text>
<text x="40" y="410" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="410" font-size="13" fill="#374151">시간, 장소, 1인 참가비(₩), 출전 인원 입력; 메모는 선택</text>
<text x="40" y="434" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="434" font-size="13" fill="#374151">6자리 관리 PIN 설정 — 이후 이 경기 수정/삭제에 필요</text>
<text x="40" y="458" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="458" font-size="13" fill="#374151">예약 만들기 누르면 홈 목록에 표시</text>
<rect x="560" y="350" width="168" height="172" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 362 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="386" width="144" height="16" rx="4" fill="#ffffff" stroke="#dfe3e8"/><rect x="572" y="410" width="144" height="16" rx="4" fill="#ffffff" stroke="#dfe3e8"/><rect x="572" y="434" width="144" height="16" rx="4" fill="#ffffff" stroke="#dfe3e8"/><rect x="572" y="458" width="144" height="16" rx="4" fill="#ffffff" stroke="#dfe3e8"/><rect x="572" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="594" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="616" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="638" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="660" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="682" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="572" y="512" width="144" height="22" rx="6" fill="#1D9E75"/>
<rect x="16" y="544" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="568" r="13" fill="#1D9E75"/><text x="40" y="573" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
<text x="64" y="574" font-size="16" font-weight="600" fill="#0b3d33">신청하기</text>
<text x="40" y="598" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="598" font-size="13" fill="#374151">경기에 들어가 신청하기 누르기</text>
<text x="40" y="622" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="622" font-size="13" fill="#374151">이름 입력 + 6자리 개인 PIN 설정</text>
<text x="40" y="646" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="646" font-size="13" fill="#374151">같은 경기 내 PIN은 중복 불가 (중복 시 변경 요청)</text>
<text x="40" y="670" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="670" font-size="13" fill="#374151">인원이 차면 이후 신청은 자동으로 대기 명단으로</text>
<text x="40" y="694" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="694" font-size="13" fill="#374151">친구 여러 명도 신청 가능 (각각 다른 이름 + PIN)</text>
<rect x="560" y="562" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 574 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="598" width="144" height="92" rx="8" fill="#ffffff" stroke="#eeeeee"/><rect x="580" y="608" width="128" height="16" rx="4" fill="#f3f4f6"/><rect x="578" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="600" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="622" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="644" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="666" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="688" y="634" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="572" y="700" width="144" height="22" rx="6" fill="#1D9E75"/>
<rect x="16" y="740" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="764" r="13" fill="#1D9E75"/><text x="40" y="769" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
<text x="64" y="770" font-size="16" font-weight="600" fill="#0b3d33">내 신청 관리</text>
<text x="40" y="794" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="794" font-size="13" fill="#374151">명단에서 본인 이름 누르기</text>
<text x="40" y="818" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="818" font-size="13" fill="#374151">신청 시 설정한 개인 PIN 입력</text>
<text x="40" y="842" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="842" font-size="13" fill="#374151">이름 수정 또는 본인 신청 삭제</text>
<text x="40" y="866" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="866" font-size="13" fill="#374151">"참가비 납부" 토글을 켜고 저장하면 명단에 초록색 "납부" 표시</text>
<text x="40" y="890" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="890" font-size="13" fill="#b91c1c">PIN 10회 연속 오류 시 약 10분 잠김 (추측 방지)</text>
<rect x="560" y="758" width="168" height="152" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 770 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="792" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><rect x="572" y="814" width="144" height="18" rx="4" fill="#E1F5EE"/><rect x="572" y="836" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><rect x="572" y="862" width="144" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/><rect x="580" y="872" width="44" height="8" rx="3" fill="#9ca3af"/><rect x="682" y="867" width="30" height="18" rx="9" fill="#1D9E75"/><circle cx="705" cy="876" r="7" fill="#ffffff"/>
<rect x="16" y="936" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="960" r="13" fill="#1D9E75"/><text x="40" y="965" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
<text x="64" y="966" font-size="16" font-weight="600" fill="#0b3d33">주최자 기능 (관리 PIN)</text>
<text x="40" y="990" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="990" font-size="13" fill="#374151">경기 수정: 시간/장소/참가비/인원 변경 가능; 날짜는 변경 불가</text>
<text x="40" y="1014" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="1014" font-size="13" fill="#374151">경기 삭제: 시작 전만 가능, 전체 신청 제거, 재확인 필요</text>
<text x="40" y="1038" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="1038" font-size="13" fill="#374151">무작위로 주장 2명 뽑기 (파랑/빨강 표시, 다시 뽑기 가능)</text>
<text x="40" y="1062" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="1062" font-size="13" fill="#b91c1c">모두 관리 PIN 필요; 단 신청 명단 자체는 수정 불가</text>
<rect x="560" y="954" width="168" height="132" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 966 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="992" width="46" height="16" rx="8" fill="#E6F1FB"/><rect x="626" y="992" width="46" height="16" rx="8" fill="#FCEBEB"/><rect x="572" y="1024" width="44" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><rect x="622" y="1024" width="44" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><rect x="672" y="1024" width="44" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
<rect x="16" y="1108" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="1132" r="13" fill="#1D9E75"/><text x="40" y="1137" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">6</text>
<text x="64" y="1138" font-size="16" font-weight="600" fill="#0b3d33">규칙 요약</text>
<text x="40" y="1162" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1162" font-size="13" fill="#374151">PIN: 관리 PIN은 경기 전체, 개인 PIN은 본인; 경기 내 고유</text>
<text x="40" y="1186" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1186" font-size="13" fill="#374151">만료: 시작 후 회색 읽기전용; 30일 후 자동 삭제, 링크도 만료</text>
<text x="40" y="1210" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1210" font-size="13" fill="#374151">공유: 각 경기 고정 링크를 친구에게 전달</text>
<text x="40" y="1234" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1234" font-size="13" fill="#374151">대기: 마감 시 대기 명단; 누군가 빠지면 순서대로 자동 승급</text>
<rect x="560" y="1126" width="168" height="124" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 1138 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1173" r="5" fill="#1D9E75"/><rect x="596" y="1170" width="34" height="6" rx="3" fill="#cbd5e1"/><rect x="648" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1173" r="5" fill="#185FA5"/><rect x="672" y="1170" width="34" height="6" rx="3" fill="#cbd5e1"/><rect x="572" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1215" r="5" fill="#BA7517"/><rect x="596" y="1212" width="34" height="6" rx="3" fill="#cbd5e1"/><rect x="648" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1215" r="5" fill="#A32D2D"/><rect x="672" y="1212" width="34" height="6" rx="3" fill="#cbd5e1"/>
</svg>
