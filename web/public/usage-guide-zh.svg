<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 760 1244">
<rect width="760" height="1244" fill="#ffffff"/>
<rect x="16" y="16" width="728" height="104" rx="14" fill="#0F6E56"/>
<text x="40" y="58" font-size="22" font-weight="600" fill="#ffffff">Pickup Football 使用说明</text>
<text x="40" y="84" font-size="13" fill="#bfe6d8">无需注册 · 凭 PIN 管理预约与报名</text>
<text x="40" y="104" font-size="12" fill="#9FE1CB">bidabrain.github.io/pickup-soccer-web</text>
<rect x="16" y="136" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="160" r="13" fill="#1D9E75"/><text x="40" y="165" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
<text x="64" y="166" font-size="16" font-weight="600" fill="#0b3d33">首页 · 浏览场次</text>
<text x="40" y="190" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="190" font-size="13" fill="#374151">打开网址即可看到所有预约场次，无需登录</text>
<text x="40" y="214" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="214" font-size="13" fill="#374151">角标显示状态：还差N人 / 已满+候补 / 已结束(灰)</text>
<text x="40" y="238" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="238" font-size="13" fill="#374151">点卡片看详情，点「分享」复制该场链接</text>
<text x="40" y="262" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="262" font-size="13" fill="#374151">点右下角 ＋ 新建预约</text>
<text x="40" y="286" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="286" font-size="13" fill="#374151">右上角可切换语言：中文 / English / 한국어</text>
<rect x="16" y="332" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="356" r="13" fill="#1D9E75"/><text x="40" y="361" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
<text x="64" y="362" font-size="16" font-weight="600" fill="#0b3d33">新建预约</text>
<text x="40" y="386" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="386" font-size="13" fill="#374151">选时区(默认韩国 KST)和日期(限今天起 7 天内)</text>
<text x="40" y="410" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="410" font-size="13" fill="#374151">填时间、场地、每人费用(₩)、上场人数，备注选填</text>
<text x="40" y="434" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="434" font-size="13" fill="#374151">设 6 位管理 PIN —— 日后改/删本场都要它</text>
<text x="40" y="458" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="458" font-size="13" fill="#374151">点「创建预约」，即出现在首页</text>
<rect x="16" y="504" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="528" r="13" fill="#1D9E75"/><text x="40" y="533" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
<text x="64" y="534" font-size="16" font-weight="600" fill="#0b3d33">报名参加</text>
<text x="40" y="558" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="558" font-size="13" fill="#374151">进入场次，点「报名参加」</text>
<text x="40" y="582" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="582" font-size="13" fill="#374151">输入名字 + 设 6 位个人 PIN</text>
<text x="40" y="606" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="606" font-size="13" fill="#374151">同一场内 PIN 不能与他人重复，重复会提示换一个</text>
<text x="40" y="630" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="630" font-size="13" fill="#374151">报名超过上场人数后，后来者自动进候补名单</text>
<text x="40" y="654" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="654" font-size="13" fill="#374151">可帮多位朋友报名(各用不同名字 + 不同 PIN)</text>
<rect x="16" y="700" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="724" r="13" fill="#1D9E75"/><text x="40" y="729" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
<text x="64" y="730" font-size="16" font-weight="600" fill="#0b3d33">管理我的报名</text>
<text x="40" y="754" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="754" font-size="13" fill="#374151">在名单里点你自己的名字</text>
<text x="40" y="778" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="778" font-size="13" fill="#374151">输入报名时设的个人 PIN</text>
<text x="40" y="802" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="802" font-size="13" fill="#374151">可改名，或删除自己的报名</text>
<text x="40" y="826" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="826" font-size="13" fill="#374151">打开「已付活动费」开关并保存，名单上会显示绿色「已付」标</text>
<text x="40" y="850" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="850" font-size="13" fill="#b91c1c">连续输错 10 次会锁约 10 分钟(防别人猜 PIN)</text>
<rect x="16" y="896" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="920" r="13" fill="#1D9E75"/><text x="40" y="925" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
<text x="64" y="926" font-size="16" font-weight="600" fill="#0b3d33">创建人功能（管理 PIN）</text>
<text x="40" y="950" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="950" font-size="13" fill="#374151">编辑本场：可改时间/场地/费用/人数；日期不可改</text>
<text x="40" y="974" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="974" font-size="13" fill="#374151">删除本场：仅未开赛，会移除全部报名，需二次确认</text>
<text x="40" y="998" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="998" font-size="13" fill="#374151">随机抽 2 名队长(蓝/红两色标注，可重抽)</text>
<text x="40" y="1022" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="1022" font-size="13" fill="#b91c1c">以上都需管理 PIN；但不能改动已报名的名单本身</text>
<rect x="16" y="1068" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="1092" r="13" fill="#1D9E75"/><text x="40" y="1097" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">6</text>
<text x="64" y="1098" font-size="16" font-weight="600" fill="#0b3d33">规则速记</text>
<text x="40" y="1122" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1122" font-size="13" fill="#374151">PIN：管理 PIN 管整场；个人 PIN 管自己；同场报名 PIN 唯一</text>
<text x="40" y="1146" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1146" font-size="13" fill="#374151">过期：开赛后置灰只读；30 天后自动清除，链接同时失效</text>
<text x="40" y="1170" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1170" font-size="13" fill="#374151">分享：每场有固定链接，发给朋友点开直接看该场详情</text>
<text x="40" y="1194" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1194" font-size="13" fill="#374151">候补：满员后报名进候补；有人退出，候补按顺序自动补上</text>
</svg>
