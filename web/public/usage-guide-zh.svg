<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 760 1284">
<rect width="760" height="1284" fill="#ffffff"/>
<rect x="16" y="16" width="728" height="104" rx="14" fill="#0F6E56"/>
<text x="40" y="58" font-size="22" font-weight="600" fill="#ffffff">Pickup Football 使用说明</text>
<text x="40" y="84" font-size="13" fill="#bfe6d8">无需注册 · 凭 PIN 管理预约与报名</text>
<text x="40" y="104" font-size="12" fill="#9FE1CB">bidabrain.github.io/pickup-soccer-web</text>
<rect x="16" y="136" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="160" r="13" fill="#1D9E75"/><text x="40" y="165" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
<text x="64" y="166" font-size="16" font-weight="600" fill="#0b3d33">首页 · 浏览场次</text>
<text x="40" y="190" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="190" font-size="13" fill="#374151">打开网址即可看到所有预约场次，无需登录</text>
<text x="40" y="214" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="214" font-size="13" fill="#374151">角标显示状态：还差N人 / 已满+候补 / 已结束(灰)</text>
<text x="40" y="238" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="238" font-size="13" fill="#374151">点卡片看详情，点「分享」复制该场链接</text>
<text x="40" y="262" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="262" font-size="13" fill="#374151">点右下角 ＋ 新建预约</text>
<text x="40" y="286" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="286" font-size="13" fill="#374151">右上角可切换语言：中文 / English / 한국어</text>
<rect x="560" y="154" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 166 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="170" font-size="9" fill="#ffffff">Pickup Football</text><rect x="572" y="186" width="144" height="40" rx="6" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="200" font-size="9" fill="#374151">周五 19:00</text><text x="580" y="216" font-size="8" fill="#9ca3af">滨江 · ₩10,000</text><rect x="668" y="190" width="48" height="15" rx="7" fill="#FAEEDA"/><text x="692" y="201" font-size="8" fill="#854F0B" text-anchor="middle">还差 7 人</text><rect x="572" y="234" width="144" height="40" rx="6" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="248" font-size="9" fill="#374151">周六 20:30</text><text x="580" y="264" font-size="8" fill="#9ca3af">大学城球场</text><rect x="680" y="238" width="36" height="15" rx="7" fill="#E1F5EE"/><text x="698" y="249" font-size="8" fill="#0F6E56" text-anchor="middle">已满</text><circle cx="704" cy="282" r="13" fill="#1D9E75"/><text x="704" y="287" font-size="17" fill="#ffffff" text-anchor="middle">+</text>
<rect x="16" y="332" width="728" height="198" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="356" r="13" fill="#1D9E75"/><text x="40" y="361" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
<text x="64" y="362" font-size="16" font-weight="600" fill="#0b3d33">新建预约</text>
<text x="40" y="386" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="386" font-size="13" fill="#374151">选时区(默认韩国 KST)和日期(限今天起 7 天内)</text>
<text x="40" y="410" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="410" font-size="13" fill="#374151">填时间、场地、每人费用(₩)、上场人数，备注选填</text>
<text x="40" y="434" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="434" font-size="13" fill="#374151">设 6 位管理 PIN —— 日后改/删本场都要它</text>
<text x="40" y="458" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="458" font-size="13" fill="#374151">点「创建预约」，即出现在首页</text>
<rect x="560" y="350" width="168" height="172" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 362 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="366" font-size="9" fill="#ffffff">← 创建预约</text><rect x="572" y="382" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="394" font-size="8.5" fill="#9ca3af">时区</text><rect x="572" y="404" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="416" font-size="8.5" fill="#9ca3af">日期</text><rect x="572" y="426" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="438" font-size="8.5" fill="#9ca3af">时间 / 场地</text><rect x="572" y="448" width="144" height="17" rx="4" fill="#ffffff" stroke="#dfe3e8"/><text x="578" y="460" font-size="8.5" fill="#9ca3af">费用 / 人数</text><text x="572" y="474" font-size="8" fill="#854F0B">管理 PIN</text><rect x="572" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="594" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="616" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="638" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="660" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="682" y="482" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="572" y="510" width="144" height="22" rx="6" fill="#1D9E75"/><text x="644" y="525" font-size="9.5" fill="#ffffff" text-anchor="middle">创建预约</text>
<rect x="16" y="544" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="568" r="13" fill="#1D9E75"/><text x="40" y="573" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
<text x="64" y="574" font-size="16" font-weight="600" fill="#0b3d33">报名参加</text>
<text x="40" y="598" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="598" font-size="13" fill="#374151">进入场次，点「报名参加」</text>
<text x="40" y="622" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="622" font-size="13" fill="#374151">输入名字 + 设 6 位个人 PIN</text>
<text x="40" y="646" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="646" font-size="13" fill="#374151">同一场内 PIN 不能与他人重复，重复会提示换一个</text>
<text x="40" y="670" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="670" font-size="13" fill="#374151">报名超过上场人数后，后来者自动进候补名单</text>
<text x="40" y="694" font-size="13" font-weight="600" fill="#1D9E75">⑤</text>
<text x="64" y="694" font-size="13" fill="#374151">可帮多位朋友报名(各用不同名字 + 不同 PIN)</text>
<rect x="560" y="562" width="168" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 574 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="578" font-size="9" fill="#ffffff">← 场次详情</text><rect x="572" y="596" width="144" height="96" rx="8" fill="#ffffff" stroke="#eeeeee"/><text x="580" y="610" font-size="9.5" fill="#374151">报名参加</text><rect x="580" y="618" width="128" height="16" rx="4" fill="#f3f4f6"/><text x="584" y="629" font-size="8" fill="#9ca3af">你的名字</text><rect x="578" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="600" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="622" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="644" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="666" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="688" y="642" width="17" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1"/><rect x="580" y="670" width="128" height="18" rx="5" fill="#1D9E75"/><text x="644" y="682" font-size="8.5" fill="#ffffff" text-anchor="middle">确认报名</text>
<rect x="16" y="740" width="728" height="182" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="764" r="13" fill="#1D9E75"/><text x="40" y="769" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
<text x="64" y="770" font-size="16" font-weight="600" fill="#0b3d33">管理我的报名</text>
<text x="40" y="794" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="794" font-size="13" fill="#374151">在名单里点你自己的名字</text>
<text x="40" y="818" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="818" font-size="13" fill="#374151">输入报名时设的个人 PIN</text>
<text x="40" y="842" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="842" font-size="13" fill="#374151">可改名，或删除自己的报名</text>
<text x="40" y="866" font-size="13" font-weight="600" fill="#1D9E75">④</text>
<text x="64" y="866" font-size="13" fill="#374151">打开「已付活动费」开关并保存，名单上会显示绿色「已付」标</text>
<text x="40" y="890" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="890" font-size="13" fill="#b91c1c">连续输错 10 次会锁约 10 分钟(防别人猜 PIN)</text>
<rect x="560" y="758" width="168" height="152" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 770 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="774" font-size="9" fill="#ffffff">← 报名名单</text><rect x="572" y="788" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><text x="578" y="801" font-size="8.5" fill="#6b7280">1. 小明</text><rect x="572" y="810" width="144" height="18" rx="4" fill="#E1F5EE"/><text x="578" y="823" font-size="8.5" fill="#0F6E56">2. 王伟</text><rect x="686" y="813" width="30" height="12" rx="6" fill="#CFEDE2"/><text x="701" y="822" font-size="7.5" fill="#0F6E56" text-anchor="middle">已付</text><rect x="572" y="832" width="144" height="18" rx="4" fill="#ffffff" stroke="#eeeeee"/><text x="578" y="845" font-size="8.5" fill="#6b7280">3. 张磊</text><rect x="572" y="858" width="144" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/><text x="580" y="876" font-size="8.5" fill="#374151">已付活动费</text><rect x="682" y="863" width="30" height="18" rx="9" fill="#1D9E75"/><circle cx="705" cy="872" r="7" fill="#ffffff"/>
<rect x="16" y="936" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="960" r="13" fill="#1D9E75"/><text x="40" y="965" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
<text x="64" y="966" font-size="16" font-weight="600" fill="#0b3d33">创建人功能（管理 PIN）</text>
<text x="40" y="990" font-size="13" font-weight="600" fill="#1D9E75">①</text>
<text x="64" y="990" font-size="13" fill="#374151">编辑本场：可改时间/场地/费用/人数；日期不可改</text>
<text x="40" y="1014" font-size="13" font-weight="600" fill="#1D9E75">②</text>
<text x="64" y="1014" font-size="13" fill="#374151">删除本场：仅未开赛，会移除全部报名，需二次确认</text>
<text x="40" y="1038" font-size="13" font-weight="600" fill="#1D9E75">③</text>
<text x="64" y="1038" font-size="13" fill="#374151">随机抽 2 名队长(蓝/红两色标注，可重抽)</text>
<text x="40" y="1062" font-size="13" font-weight="600" fill="#b91c1c">!</text>
<text x="64" y="1062" font-size="13" fill="#b91c1c">以上都需管理 PIN；但不能改动已报名的名单本身</text>
<rect x="560" y="954" width="168" height="132" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 966 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><text x="572" y="970" font-size="9" fill="#ffffff">← 场次详情</text><rect x="572" y="988" width="50" height="16" rx="8" fill="#E6F1FB"/><text x="597" y="999" font-size="8" fill="#185FA5" text-anchor="middle">小明</text><rect x="630" y="988" width="50" height="16" rx="8" fill="#FCEBEB"/><text x="655" y="999" font-size="8" fill="#A32D2D" text-anchor="middle">阿强</text><rect x="572" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="595" y="1034" font-size="8" fill="#374151" text-anchor="middle">抽队长</text><rect x="622" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="645" y="1034" font-size="8" fill="#374151" text-anchor="middle">编辑</text><rect x="672" y="1020" width="46" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/><text x="695" y="1034" font-size="8" fill="#374151" text-anchor="middle">删除</text>
<rect x="16" y="1108" width="728" height="158" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<circle cx="40" cy="1132" r="13" fill="#1D9E75"/><text x="40" y="1137" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">6</text>
<text x="64" y="1138" font-size="16" font-weight="600" fill="#0b3d33">规则速记</text>
<text x="40" y="1162" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1162" font-size="13" fill="#374151">PIN：管理 PIN 管整场；个人 PIN 管自己；同场报名 PIN 唯一</text>
<text x="40" y="1186" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1186" font-size="13" fill="#374151">过期：开赛后置灰只读；30 天后自动清除，链接同时失效</text>
<text x="40" y="1210" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1210" font-size="13" fill="#374151">分享：每场有固定链接，发给朋友点开直接看该场详情</text>
<text x="40" y="1234" font-size="13" font-weight="600" fill="#9ca3af">•</text>
<text x="64" y="1234" font-size="13" fill="#374151">候补：满员后报名进候补；有人退出，候补按顺序自动补上</text>
<rect x="560" y="1126" width="168" height="124" rx="12" fill="#f9fafb" stroke="#e5e7eb"/><path d="M560 1138 a12 12 0 0 1 12 -12 h144 a12 12 0 0 1 12 12 v12 h-168 z" fill="#0F6E56"/><rect x="572" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1173" r="5" fill="#1D9E75"/><text x="594" y="1177" font-size="9" fill="#374151">PIN</text><rect x="648" y="1156" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1173" r="5" fill="#185FA5"/><text x="670" y="1177" font-size="9" fill="#374151">过期</text><rect x="572" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="584" cy="1215" r="5" fill="#BA7517"/><text x="594" y="1219" font-size="9" fill="#374151">分享</text><rect x="648" y="1198" width="68" height="34" rx="6" fill="#f3f4f6"/><circle cx="660" cy="1215" r="5" fill="#A32D2D"/><text x="670" y="1219" font-size="9" fill="#374151">候补</text>
</svg>
